<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitación Baby Shower</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&family=Pacifico&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body{
 margin:0;
 font-family:'Nunito',sans-serif;
 background:#f0f2f5;
 display:flex;
 justify-content:center;
 align-items:center;
 min-height:100vh;
}

#stage{
 width:100%;
 max-width:480px;
 height:100vh;
 background:white;
 overflow:hidden;
 position:relative;
}

/* PORTADA */
#cover{
 position:absolute;
 width:100%;
 height:100%;
 background:
 linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.6)),
 url('https://i.imgur.com/8jakDQj.jpeg') center/cover no-repeat;
 display:flex;
 flex-direction:column;
 justify-content:center;
 align-items:center;
 color:white;
 animation:zoom 10s infinite alternate;
 z-index:10;
}

@keyframes zoom{
 from{background-size:100%;}
 to{background-size:115%;}
}

.btn-open{
 background:white;
 color:#333;
 padding:14px 35px;
 border:none;
 border-radius:30px;
 font-weight:bold;
 cursor:pointer;
 box-shadow:0 10px 30px rgba(0,0,0,.4);
}

/* CONTENIDO */
#card{
 opacity:0;
 height:100%;
 overflow-y:auto;
 padding:20px;
 background:linear-gradient(#dff3ff,#fff);
}

.fade{
 opacity:0;
 transform:translateY(30px);
 transition:.6s;
}
.fade.show{
 opacity:1;
 transform:translateY(0);
}

.btn{
 display:block;
 width:100%;
 padding:14px;
 margin-top:10px;
 border-radius:15px;
 border:none;
 font-weight:bold;
 cursor:pointer;
}

.btn-map{background:white;border:1px solid #ddd;}
.btn-wsp{background:#25D366;color:white;}

.team{
 display:flex;
 gap:10px;
 margin-top:15px;
}
.team button{
 flex:1;
}
</style>
</head>

<body>

<div id="stage">

<div id="cover">
<h1 style="font-size:2.8rem;">¡Sorpresa!</h1>
<p>Tienes una invitación especial</p>
<button class="btn-open" id="open">ABRIR</button>
</div>

<div id="card">

<h2 class="fade">¡Una bebé está en camino!</h2>

<div class="fade">
<p><strong>Lugar:</strong><br>
KM 10 vía Matanza (Capilla Baja)<br>
Finca El Paraíso</p>

<p><strong>Fecha:</strong><br>
04 Abril 2026 - 4:00 PM</p>
</div>

<div class="fade">
<h3>🎯 Elige tu equipo</h3>

<div class="team">
<button class="btn" onclick="pick('NIÑO')">💙 Niño</button>
<button class="btn" onclick="pick('NIÑA')">💗 Niña</button>
</div>

<p id="result"></p>
</div>

<div class="fade">
<a href="https://maps.app.goo.gl/drr3JZ5VjAsqiFBT6" target="_blank" class="btn btn-map">
Ver ubicación
</a>

<a href="https://wa.me/573228853714?text=Confirmo asistencia" target="_blank" class="btn btn-wsp">
Confirmar asistencia
</a>
</div>

</div>
</div>

<script>

/* ABRIR */
const tl=gsap.timeline({paused:true});
tl.to("#cover",{yPercent:-100,duration:.8})
.set("#card",{opacity:1})
.add(()=>confetti({particleCount:80,spread:70}));

document.getElementById("open").onclick=()=>tl.play();

/* SCROLL */
const items=document.querySelectorAll(".fade");
window.addEventListener("scroll",()=>{
 items.forEach(el=>{
  if(el.getBoundingClientRect().top<window.innerHeight-50){
   el.classList.add("show");
  }
 });
});

/* ELECCIÓN */
function pick(team){
 document.getElementById("result").innerText="Elegiste: "+team;
 confetti({particleCount:60,spread:80});
}

</script>

</body>
</html>
