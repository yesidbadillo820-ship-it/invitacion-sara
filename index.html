<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitación Baby Shower</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&family=Pacifico&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body{font-family:'Nunito';margin:0;background:#f0f2f5;}
#stage{max-width:480px;margin:auto;background:#fff;min-height:100vh;}
#cover{height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;color:white;
background:linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.6)),url('https://i.imgur.com/8jakDQj.jpeg') center/cover;}
.btn-open{padding:15px 30px;border:none;border-radius:30px;background:white;font-weight:bold;}

#card{display:none;padding:20px;background:linear-gradient(#dff3ff,#fff);}
.btn{padding:12px;border-radius:12px;border:none;width:100%;margin-top:10px;font-weight:bold;}
.btn-wsp{background:#25D366;color:white;}
.team{display:flex;gap:10px;}
input{width:100%;padding:10px;margin-top:5px;border-radius:10px;border:1px solid #ccc;}
</style>
</head>

<body>

<div id="stage">

<div id="cover">
<h1>¡Sorpresa!</h1>
<button class="btn-open" onclick="openCard()">ABRIR</button>
</div>

<div id="card">

<h2>¡Una bebé está en camino!</h2>

<p><strong>Lugar:</strong><br>
KM 10 vía Matanza - Finca El Paraíso</p>

<p><strong>Fecha:</strong><br>
04 Abril 2026 - 3:00 PM</p>

<hr>

<h3>🎯 Elige tu equipo</h3>
<p id="counter">Cargando...</p>

<div class="team">
<button class="btn" onclick="pick('niño')">💙 Niño</button>
<button class="btn" onclick="pick('niña')">💗 Niña</button>
</div>

<hr>

<h3>Confirmar asistencia</h3>

<input id="nombre" placeholder="Tu nombre">
<input id="personas" type="number" value="1">

<button class="btn btn-wsp" onclick="confirmar()">Confirmar</button>

<ul id="lista"></ul>

</div>
</div>

<script>
function openCard(){
 document.getElementById("cover").style.display="none";
 document.getElementById("card").style.display="block";
 confetti({particleCount:100,spread:80});
}
</script>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, doc, updateDoc, increment, onSnapshot,
 collection, addDoc, serverTimestamp, query, orderBy }
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
 apiKey: "AIzaSyB-xnzySrU14zbdILl5Tq20XqGdMKagEtc",
 authDomain: "baby-shower-6f8a2.firebaseapp.com",
 projectId: "baby-shower-6f8a2",
 storageBucket: "baby-shower-6f8a2.firebasestorage.app",
 messagingSenderId: "75598200130",
 appId: "1:75598200130:web:29816bcfbf5c5fecac1cdb"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* CONTADOR */
const ref = doc(db,"invitacion","babyshower");

onSnapshot(ref,(docSnap)=>{
 const d=docSnap.data();
 if(d){
  document.getElementById("counter").innerText =
   "💙 Niño: "+d.niño+" | 💗 Niña: "+d.niña;
 }
});

window.pick = async function(team){
 await updateDoc(ref,{ [team]: increment(1) });
 confetti({particleCount:60,spread:70});
};

/* INVITADOS */
const invitadosRef = collection(db,"invitados");

window.confirmar = async function(){

 const nombre=document.getElementById("nombre").value;
 const personas=parseInt(document.getElementById("personas").value);

 if(!nombre){ alert("Escribe tu nombre"); return; }

 await addDoc(invitadosRef,{
  nombre,
  personas,
  timestamp: serverTimestamp()
 });

 document.getElementById("nombre").value="";
};

/* LISTA */
const q=query(invitadosRef,orderBy("timestamp","desc"));

onSnapshot(q,(snapshot)=>{
 let html="";
 snapshot.forEach(doc=>{
  const d=doc.data();
  html+=`<li>${d.nombre} (${d.personas})</li>`;
 });
 document.getElementById("lista").innerHTML=html;
});

</script>

</body>
</html>
